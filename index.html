<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velora Fleet Systems</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <aside class="sidebar">

    <div class="brand-card">
      <h1>Velora Fleet Systems</h1>
    </div>

    <div class="card" id="admin-controls" style="display:none;">
      <h3>Panel administratora</h3>

      <input id="start-lat" placeholder="Start LAT (np 52.2297)">
      <input id="start-lng" placeholder="Start LNG (np 21.0122)">

      <input id="end-lat" placeholder="Cel LAT (np 52.5200)">
      <input id="end-lng" placeholder="Cel LNG (np 13.4050)">

      <input id="duration" placeholder="Czas (minuty)" value="60">

      <button id="start-trip">Start przejazdu</button>
    </div>

    <div class="card">
      <h3>Status</h3>
      <div id="status">Ładowanie...</div>
    </div>

  </aside>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
